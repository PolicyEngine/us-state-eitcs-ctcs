<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Explore how state-level Earned Income Tax Credits and Child Tax Credits reduce poverty across American communities. Interactive map and data powered by PolicyEngine microsimulation."
    />
    <meta name="theme-color" content="#319795" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="canonical" href="https://policyengine.github.io/us-state-eitcs-ctcs/" />
    <title>State Tax Credits Impact | PolicyEngine</title>

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="The Impact of State Tax Credits on American Families"
    />
    <meta
      property="og:description"
      content="Explore how state-level Earned Income Tax Credits and Child Tax Credits reduce poverty across communities. Interactive map by PolicyEngine."
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://policyengine.github.io/us-state-eitcs-ctcs/"
    />
    <meta property="og:site_name" content="PolicyEngine" />
    <meta
      property="og:image"
      content="https://policyengine.github.io/us-state-eitcs-ctcs/social-preview.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="The Impact of State Tax Credits on American Families"
    />
    <meta
      name="twitter:description"
      content="Explore how state-level EITCs and CTCs reduce poverty across communities. Interactive map by PolicyEngine."
    />
    <meta
      name="twitter:image"
      content="https://policyengine.github.io/us-state-eitcs-ctcs/social-preview.png"
    />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "State Tax Credits Impact Dashboard",
        "description": "Interactive analysis of how state-level Earned Income Tax Credits and Child Tax Credits reduce poverty across American communities.",
        "url": "https://policyengine.github.io/us-state-eitcs-ctcs/",
        "applicationCategory": "DataVisualization",
        "operatingSystem": "Any",
        "creator": {
          "@type": "Organization",
          "name": "PolicyEngine",
          "url": "https://policyengine.org"
        },
        "about": {
          "@type": "Dataset",
          "name": "State EITC and CTC Impact Data",
          "description": "Microsimulation estimates of poverty reduction from state-level Earned Income Tax Credits and Child Tax Credits.",
          "temporalCoverage": "2025/2026",
          "spatialCoverage": {
            "@type": "Place",
            "name": "United States"
          }
        }
      }
    </script>

    <!-- Fonts (async loading) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="padding: 40px; text-align: center; font-family: sans-serif">
        <h1>State Tax Credits Impact | PolicyEngine</h1>
        <p>
          This interactive dashboard requires JavaScript to run. Please enable
          JavaScript in your browser to explore how state-level Earned Income Tax
          Credits and Child Tax Credits reduce poverty across American
          communities.
        </p>
        <p>
          Learn more at
          <a href="https://policyengine.org">policyengine.org</a>.
        </p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
